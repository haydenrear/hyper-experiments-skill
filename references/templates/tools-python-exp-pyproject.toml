[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "python-exp"
version = "0.1.0"
description = "Shared functions and modules used across experiments in this hyper-experiments project."
requires-python = ">=3.10"
dependencies = []

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
