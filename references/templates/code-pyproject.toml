[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "{{experiment_id}}-{{slug}}"
version = "0.1.0"
description = "{{title}}"
requires-python = ">=3.10"
dependencies = [
  "python-exp",
  "torch==2.11.0",
  "tensorboard>=2.17,<3"
]

[project.scripts]
run-experiment = "run_experiment:main"
check-regressions = "check_regressions:main"

[tool.setuptools]
py-modules = ["run_experiment", "check_regressions"]

[tool.uv.sources]
python-exp = { path = "../../../../../tools/python_exp", editable = true }

# This experiment's code snapshot is a standalone uv project so the
# experiment can be reproduced later without depending on project-wide
# environment state. Add dependencies above and run `uv sync` inside this
# directory to build an isolated environment for the run.
#
# The shared library `python-exp` is resolved through `[tool.uv.sources]`
# to `<root>/tools/python_exp` as an editable install, so changes to
# shared tools are picked up without reinstalling.
#
# CHAIN OF CUSTODY: the editable link above is for development convenience
# only. Before this experiment is launched (status moves from `planned`
# to `running`), you MUST vendor `tools/python_exp/` into
# `./vendored/python_exp/` and rewrite the source above to:
#
#   [tool.uv.sources]
#   python-exp = { path = "./vendored/python_exp" }
#
# without `editable = true`. This makes the experiment reproducible
# forever, independent of future changes to `tools/python_exp/`.
# See `references/chain-of-custody.md` for the full policy.
#
# Keep this file versioned with the code snapshot. If the counterfactual
# delta includes a dependency change, that change must be visible here.
#
# TENSORBOARD: `tensorboard` pins the event file format that `tb-query`
# and any shared analysis helpers read; `torch.utils.tensorboard`
# provides the `SummaryWriter` used by `run_experiment.py`. Experiments
# that do not want a torch dependency can swap `torch` for
# `tensorboardX>=2.6.2` and change the import in `run_experiment.py` —
# the writer API is identical. Pick one and stick with it within a
# family so sibling event files stay comparable. See SKILL.md >
# "TensorBoard logging".
